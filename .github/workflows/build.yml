name: Build Dawn

on:
  workflow_dispatch:
    inputs:
      chrome_build:
        description: "Chrome build number (e.g. 7778 for chromium/7778)"
        required: true
        default: "7778"

permissions:
  contents: read

concurrency:
  group: dawn-build-${{ github.workflow }}-${{ inputs.chrome_build }}
  cancel-in-progress: false

env:
  CMAKE_FLAGS: >-
    -DDAWN_ENABLE_NULL=OFF
    -DDAWN_ENABLE_SPIRV_VALIDATION=ON
    -DDAWN_BUILD_SAMPLES=OFF
    -DDAWN_BUILD_TESTS=OFF
    -DDAWN_BUILD_BENCHMARKS=OFF
    -DDAWN_BUILD_NODE_BINDINGS=OFF
    -DDAWN_ENABLE_SWIFTSHADER=OFF
    -DDAWN_ENABLE_INSTALL=ON
    -DDAWN_BUILD_MONOLITHIC_LIBRARY=SHARED
    -DDAWN_BUILD_PROTOBUF=OFF
    -DTINT_BUILD_TESTS=OFF
    -DTINT_BUILD_CMD_TOOLS=ON
    -DDAWN_FETCH_DEPENDENCIES=ON

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      dawn_ref: ${{ steps.resolve.outputs.ref }}
      dawn_commit: ${{ steps.resolve.outputs.commit }}
    steps:
      - name: Resolve Dawn ref from Chrome build number
        id: resolve
        run: |
          BUILD="${{ inputs.chrome_build }}"
          echo "Resolving Dawn ref for Chrome build ${BUILD}..."

          # List all chromium/<build> and chromium/<build>_* refs, pick the one with the highest suffix
          REFS=$(git ls-remote https://dawn.googlesource.com/dawn "refs/heads/chromium/${BUILD}*" 2>/dev/null)

          if [ -z "$REFS" ]; then
            echo "ERROR: No Dawn branch found for chromium/${BUILD}" >&2
            exit 1
          fi

          # Find the ref with the highest patch suffix (e.g. 7778_5 > 7778_2 > 7778)
          BEST_REF=$(echo "$REFS" | awk '{print $2}' | sed 's|refs/heads/||' | sort -t_ -k2 -n | tail -1)
          BEST_COMMIT=$(echo "$REFS" | grep "refs/heads/${BEST_REF}$" | awk '{print $1}')

          echo "  ref:     ${BEST_REF}"
          echo "  commit:  ${BEST_COMMIT:0:12}"
          echo "ref=${BEST_REF}" >> "$GITHUB_OUTPUT"
          echo "commit=${BEST_COMMIT:0:12}" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            cmake_extra: -DTINT_BUILD_NULL_WRITER=ON
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Dawn
        uses: actions/checkout@v4
        with:
          repository: google/dawn
          ref: ${{ needs.resolve.outputs.dawn_ref }}
          path: dawn
          fetch-depth: 1

      - name: Determine Dawn commit
        id: dawn
        working-directory: dawn
        run: echo "commit=${{ needs.resolve.outputs.dawn_commit }}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev mesa-common-dev libx11-xcb-dev pkg-config

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Print Windows SDK version
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Windows SDK dir:"
          Get-ChildItem "$env:WindowsSdkDir\bin" | Select-Object Name
          Write-Host "UCRT dir:"
          Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\d3dcompiler_47.dll" -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Configure
        run: |
          cmake -S dawn -B build -GNinja -DCMAKE_BUILD_TYPE=Release ${{ env.CMAKE_FLAGS }} ${{ matrix.cmake_extra }}
        shell: bash

      - name: Build
        run: cmake --build build
        shell: bash

      - name: Install
        run: cmake --install build --prefix install
        shell: bash

      - name: Copy Windows runtime DLLs
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "install/bin"
          if (-not (Test-Path $binDir)) { New-Item -ItemType Directory -Path $binDir -Force }

          # Find d3dcompiler_47.dll from Windows SDK
          $dll = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\d3dcompiler_47.dll" -ErrorAction SilentlyContinue |
            Sort-Object Name -Descending | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName -Destination $binDir
            Write-Host "Copied: $($dll.FullName)"
          } else {
            Write-Error "d3dcompiler_47.dll not found in Windows SDK"
            exit 1
          }

          # Copy Dawn shared library (may be in bin/ already or lib/)
          $dawnDll = Get-ChildItem -Path "install" -Recurse -Filter "dawn.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dawnDll) {
            $dawnDll = Get-ChildItem -Path "install" -Recurse -Filter "webgpu_dawn.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($dawnDll -and ($dawnDll.DirectoryName -ne (Resolve-Path $binDir).Path)) {
            Copy-Item $dawnDll.FullName -Destination $binDir
            Write-Host "Copied: $($dawnDll.FullName)"
          }

      - name: Package
        shell: bash
        run: |
          mkdir artifact
          cd install
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip ../artifact/dawn-${{ matrix.platform }}-${{ matrix.arch }}.zip .
          else
            tar czf ../artifact/dawn-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifact/*
          retention-days: 1

  release:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine Dawn commit
        id: dawn
        run: |
          echo "commit=${{ needs.resolve.outputs.dawn_commit }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect packages
        run: |
          mkdir release
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dawn-chrome-${{ inputs.chrome_build }}
          name: Dawn for Chrome ${{ inputs.chrome_build }}
          body: |
            Pre-built Dawn binaries matching Chrome build `${{ inputs.chrome_build }}` (Dawn commit `${{ steps.dawn.outputs.commit }}`).

            **Platforms:**
            - `macos-aarch64` (Apple Silicon)
            - `macos-x86_64` (Intel Mac)
            - `linux-x86_64`
            - `windows-x86_64`

            **Build options:**
            - Monolithic shared library
            - GPU backends: platform defaults (D3D11/D3D12/Vulkan on Windows, Metal on macOS, OpenGL/Vulkan on Linux)
            - Tint command-line tools included
            - Samples, tests, benchmarks, fuzzers excluded

            **Windows note:** `d3dcompiler_47.dll` is included in `bin/`.
          files: release/*
